<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gize Chat</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 15px/1.5 system-ui, sans-serif;
        display: flex; flex-direction: column; height: 100vh;
      }
      header { padding: 12px 16px; border-bottom: 1px solid #8883; font-weight: 600; }
      header small { font-weight: 400; opacity: 0.6; }
      #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
      .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; background: #8882; }
      .msg .who { font-size: 12px; font-weight: 600; opacity: 0.7; margin-bottom: 2px; }
      .me { align-self: flex-end; background: #3b82f6; color: #fff; }
      form { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8883; }
      input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #8886; background: transparent; color: inherit; }
      button { padding: 10px 16px; border: 0; border-radius: 8px; background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; }
      #name { max-width: 160px; }
    </style>
  </head>
  <body>
    <header>Gize Chat <small>— a reference app built with <code>gize new --ws</code></small></header>
    <div id="log"></div>
    <form id="form">
      <input id="name" placeholder="your name" value="" autocomplete="off" />
      <input id="text" placeholder="type a message…" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
    <script>
      const log = document.getElementById("log");
      const form = document.getElementById("form");
      const nameEl = document.getElementById("name");
      const textEl = document.getElementById("text");
      nameEl.value = "user-" + Math.floor(Math.random() * 1000);

      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        const el = document.createElement("div");
        el.className = "msg" + (m.username === nameEl.value ? " me" : "");
        el.innerHTML = `<div class="who"></div><div class="body"></div>`;
        el.querySelector(".who").textContent = m.username;
        el.querySelector(".body").textContent = m.content;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
      };

      form.onsubmit = (e) => {
        e.preventDefault();
        const content = textEl.value.trim();
        if (!content) return;
        ws.send(JSON.stringify({ username: nameEl.value || "anon", content }));
        textEl.value = "";
      };
    </script>
  </body>
</html>
