name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: run the full quality suite (fmt + clippy + test) before anything is published.
  # A tag with a red build never reaches crates.io.
  verify:
    name: verify
    uses: ./.github/workflows/ci.yml

  publish:
    name: publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Publica na ordem de dependência. Cada `cargo publish` espera o crate
      # aparecer no index antes de retornar, então o próximo já resolve.
      # gize-generator depende de gize-core, gize-templates, gize-openapi e gize-admin,
      # então todos eles vêm antes dele (ADR-006/010/015 — Beta).
      - name: Publish gize-core
        run: cargo publish -p gize-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-templates
        run: cargo publish -p gize-templates --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-openapi
        run: cargo publish -p gize-openapi --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-db
        run: cargo publish -p gize-db --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-admin
        run: cargo publish -p gize-admin --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-generator
        run: cargo publish -p gize-generator --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Crates independentes (sem dependências internas) — ordem livre.
      - name: Publish gize-macros
        run: cargo publish -p gize-macros --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize-testing
        run: cargo publish -p gize-testing --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gize
        run: cargo publish -p gize --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
