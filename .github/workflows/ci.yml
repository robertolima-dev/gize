name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reusable: the Release workflow calls this as a gate before publishing.
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  generated:
    name: generated apps · fmt-check + type-check (postgres · sqlite · mysql)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build the gize CLI
        run: cargo build -p gize

      - name: Generate apps across dialects + features; each must be rustfmt-clean and type-check
        run: |
          set -euo pipefail
          GIZE="$PWD/target/debug/gize"
          WORK="$(mktemp -d)"; cd "$WORK"

          # A generated app must land rustfmt-clean (ADR-020) and compile. Runtime queries mean
          # `cargo check` needs no database, so every dialect is covered without a DB service.
          check() {
            echo "::group::$1"
            ( cd "$1" && cargo fmt --all -- --check && cargo check )
            echo "::endgroup::"
          }

          # Postgres (default) with OpenAPI + WebSocket + a CRUD resource.
          "$GIZE" new pg --openapi --ws
          ( cd pg && "$GIZE" make crud Product name:String price:i32 active:bool )
          check pg

          # SQLite, versioned API.
          "$GIZE" new lite --database sqlite --api-version 1
          ( cd lite && "$GIZE" make crud Item name:String )
          check lite

          # MySQL with a foreign-key resource.
          "$GIZE" new my --database mysql
          ( cd my && "$GIZE" make crud Order total:i64 buyer:belongs_to:users )
          check my

          echo "OK: generated apps are rustfmt-clean and type-check on postgres, sqlite and mysql"

  bench:
    name: benchmarks · generation speed (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Runs the criterion benchmarks so they never rot and their numbers show up in the logs.
      # The hard regression *gate* is the `generation_stays_within_a_generous_time_budget` test
      # in the `quality` job — a coarse budget that fails on catastrophic slowdowns without
      # flaking on runner variance; criterion here is for tracking the real numbers.
      - name: Run generation benchmarks
        run: cargo bench -p gize-generator

  e2e:
    name: e2e · generate → migrate → serve → call routes (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build the gize CLI
        run: cargo build -p gize

      - name: Generate a SQLite app, run it, and exercise its routes
        run: |
          set -euo pipefail
          GIZE="$PWD/target/debug/gize"
          WORK="$(mktemp -d)"; cd "$WORK"
          "$GIZE" new blog --database sqlite
          cd blog
          "$GIZE" make crud Post title:String published:bool author:belongs_to:users
          cat > .env <<EOF
          DATABASE_URL=sqlite://blog.db?mode=rwc
          PORT=8080
          GIZE_JWT_SECRET=ci-secret
          EOF
          set -a; . ./.env; set +a
          "$GIZE" migrate
          # An admin is needed to exercise the admin-gated users routes (ADR-021).
          ADMPW='adminpass123' "$GIZE" createadmin --email admin@x.com --name Admin --password-env ADMPW
          cargo build
          ./target/debug/blog & SRV=$!
          trap 'kill $SRV 2>/dev/null || true' EXIT
          # `posts` reads are public (generic resource), so use one as the readiness probe.
          for i in $(seq 1 60); do curl -sf localhost:8080/posts >/dev/null 2>&1 && break; sleep 1; done
          code() { curl -s -o /dev/null -w '%{http_code}' "$@"; }
          token_of() { python3 -c "import sys,json;print(json.load(sys.stdin)['token'])"; }
          # generic-resource writes require auth
          [ "$(code -X POST localhost:8080/posts -d '{}')" = "401" ]
          # register is public and returns a token (for a non-admin user)
          TOKEN=$(curl -s -X POST localhost:8080/users/register -H 'content-type: application/json' \
            -d '{"name":"Ada","email":"ada@x.com","password":"longenough","is_admin":false}' | token_of)
          # the users resource is admin-gated end to end (ADR-021): reads are 401 without a token,
          # 403 with a non-admin token, and 200 only for an admin. (HTTP codes are captured into
          # variables first: nesting quoted JSON inside `[ "$(...)" ]` trips bash brace expansion.)
          NOAUTH=$(code localhost:8080/users);                                     [ "$NOAUTH" = "401" ]
          NONADMIN=$(code localhost:8080/users -H "authorization: Bearer $TOKEN");  [ "$NONADMIN" = "403" ]
          ADMTOK=$(curl -s -X POST localhost:8080/users/login -H 'content-type: application/json' \
            -d '{"email":"admin@x.com","password":"adminpass123"}' | token_of)
          ADMIN=$(code localhost:8080/users -H "authorization: Bearer $ADMTOK");    [ "$ADMIN" = "200" ]
          # an author id (read with the admin token) lets the non-admin user create a post
          AUTHOR=$(curl -s localhost:8080/users -H "authorization: Bearer $ADMTOK" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)[0]['id'])")
          POST_BODY="{\"title\":\"Hi\",\"published\":true,\"author_id\":\"$AUTHOR\"}"
          CREATED=$(code -X POST localhost:8080/posts -H "authorization: Bearer $TOKEN" \
            -H 'content-type: application/json' -d "$POST_BODY");                   [ "$CREATED" = "201" ]
          # duplicate email is a 409 (SQLite unique violation mapped through the dialect seam)
          [ "$(code -X POST localhost:8080/users/register -H 'content-type: application/json' \
            -d '{"name":"B","email":"ada@x.com","password":"longenough","is_admin":false}')" = "409" ]
          echo "e2e OK: users admin-gated (401/403/200), posts 401 unauth / 201 authed, 409 duplicate — SQLite app"
